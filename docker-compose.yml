services:
  db:
    image: postgres:16
    container_name: economy_postgres
    environment:
      POSTGRES_USER: economy
      POSTGRES_PASSWORD: economy
      POSTGRES_DB: economy
    ports:
      - "5432:5432"
    volumes:
      - economy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U economy -d economy"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: economy_api
    environment:
      DATABASE_URL: postgresql://economy:economy@db:5432/economy
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  economy_pgdata:
